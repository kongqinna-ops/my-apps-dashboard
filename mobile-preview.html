<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机预览 - 应用仪表盘</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }

  /* Top bar */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: #16213e;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
    border-bottom: 1px solid #0f3460;
  }
  .top-bar label { color: #8892b0; font-size: 13px; }
  .top-bar select {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #233554;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    outline: none;
  }
  .top-bar .url-bar {
    background: #0f3460;
    color: #64ffda;
    border: 1px solid #233554;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    font-family: monospace;
    max-width: 320px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .top-bar button {
    background: #233554;
    color: #8892b0;
    border: 1px solid #0f3460;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .top-bar button:hover { background: #0f3460; color: #e0e0e0; }

  /* Phone container */
  .phone-wrapper {
    margin-top: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 48px);
    padding: 20px;
  }

  /* iPhone 17 Pro Max frame - Titanium Natural */
  .phone {
    position: relative;
    width: 440px;
    height: 956px;
    background: linear-gradient(145deg, #e8e2d9, #c9c1b4, #b8a99a);
    border-radius: 62px;
    box-shadow:
      0 0 0 3px #9a8e7f,
      0 0 0 6px #3a3530,
      0 0 0 9px #6b6359,
      0 25px 80px rgba(0,0,0,0.85),
      inset 0 0 1px rgba(255,255,255,0.25);
    overflow: hidden;
  }

  /* Dynamic Island - iPhone 17 Pro Max style (wider for larger screen) */
  .dynamic-island {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 148px;
    height: 40px;
    background: #000;
    border-radius: 24px;
    z-index: 10;
    box-shadow: 0 0 0 2px #1a1a1a;
  }

  /* Screen area */
  .screen {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border-radius: 54px;
    overflow: hidden;
    background: #000;
  }

  /* iframe fills screen */
  .screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 54px;
  }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 5px;
    background: rgba(255,255,255,0.35);
    border-radius: 3px;
    z-index: 10;
    pointer-events: none;
  }

  /* Side buttons - iPhone 17 Pro Max style */
  .side-btn-left {
    position: absolute;
    left: -3px;
    width: 3px;
    border-radius: 2px 0 0 2px;
    background: linear-gradient(to right, #9a8e7f, #6b6359);
  }
  .btn-silent { top: 158px; height: 32px; }
  .btn-vol-up { top: 210px; height: 70px; }
  .btn-vol-down { top: 296px; height: 70px; }
  .side-btn-right {
    position: absolute;
    right: -3px;
    width: 3px;
    height: 90px;
    top: 234px;
    border-radius: 0 2px 2px 0;
    background: linear-gradient(to left, #9a8e7f, #6b6359);
  }

  /* Responsive: scale phone if viewport is small */
  @media (max-height: 1050px) {
    .phone { transform: scale(0.82); transform-origin: center center; }
  }
  @media (max-height: 820px) {
    .phone { transform: scale(0.65); transform-origin: center center; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <label>📱 手机预览</label>
  <select id="deviceSelect" onchange="changeDevice()">
    <option value="iphone-17pm" selected>iPhone 17 Pro Max（默认）</option>
    <option value="iphone-17p">iPhone 17 Pro</option>
    <option value="iphone-16pm">iPhone 16 Pro Max</option>
    <option value="iphone-15">iPhone 15 Pro</option>
    <option value="iphone-se">iPhone SE / Mini</option>
    <option value="pixel-9">Pixel 9 / Samsung</option>
    <option value="ipad-mini">iPad Mini</option>
  </select>
  <div class="url-bar" id="urlDisplay">加载中...</div>
  <button onclick="reloadIframe()">🔄 刷新</button>
  <button onclick="toggleFullscreen()">⛶ 全屏</button>
</div>

<!-- Phone frame -->
<div class="phone-wrapper">
  <div class="phone" id="phoneFrame">
    <!-- Side buttons -->
    <div class="side-btn-left btn-silent"></div>
    <div class="side-btn-left btn-vol-up"></div>
    <div class="side-btn-left btn-vol-down"></div>
    <div class="side-btn-right"></div>

    <!-- Dynamic Island -->
    <div class="dynamic-island"></div>

    <!-- Screen -->
    <div class="screen">
      <iframe id="phoneIframe" src="index.html?v=2"></iframe>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator"></div>
  </div>
</div>

<script>
  const devices = {
    "iphone-17pm": { w: 440, h: 956,  r: 62, sr: 54 },
    "iphone-17p":  { w: 402, h: 874,  r: 56, sr: 48 },
    "iphone-16pm": { w: 445, h: 956,  r: 58, sr: 50 },
    "iphone-15":   { w: 393, h: 852,  r: 52, sr: 44 },
    "iphone-se":   { w: 375, h: 667,  r: 44, sr: 36 },
    "pixel-9":    { w: 412, h: 915,  r: 36, sr: 32 },
    "ipad-mini":  { w: 744, h: 1133, r: 36, sr: 28 },
  };

  function changeDevice() {
    const sel = document.getElementById("deviceSelect").value;
    const d = devices[sel];
    const phone = document.getElementById("phoneFrame");
    phone.style.width = d.w + "px";
    phone.style.height = d.h + "px";
    phone.style.borderRadius = d.r + "px";
    // Adjust screen border-radius
    const screen = phone.querySelector(".screen");
    screen.style.borderRadius = (d.r - 8) + "px";
    screen.querySelector("iframe").style.borderRadius = (d.r - 8) + "px";
    // Adjust dynamic island for smaller devices
    const island = phone.querySelector(".dynamic-island");
    island.style.width = (d.w < 400 ? 110 : 140) + "px";
  }

  function reloadIframe() {
    const iframe = document.getElementById("phoneIframe");
    iframe.src = iframe.src;
  }

  function toggleFullscreen() {
    const wrapper = document.querySelector(".phone-wrapper");
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      wrapper.requestFullscreen();
    }
  }

  // Update URL display when iframe loads
  const iframe = document.getElementById("phoneIframe");
  iframe.addEventListener("load", () => {
    try {
      const url = iframe.contentWindow.location.href;
      document.getElementById("urlDisplay").textContent = url || "index.html";
    } catch(e) {
      document.getElementById("urlDisplay").textContent = "index.html (本地)";
    }
  });
</script>
</body>
</html>
