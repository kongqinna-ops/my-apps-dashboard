<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>应用控制台</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --white:#fff;--bg:#f9fafb;--surface:#fff;
      --border:#e5e7eb;--border-light:#f0f0f2;
      --text:#111827;--text-sec:#6b7280;--text-light:#9ca3af;
      --primary:#4f46e5;--primary-soft:#eef2ff;--primary-hover:#4338ca;
      --green:#059669;--green-bg:#ecfdf5;--pink-bg:#fdf2f8;--pink:#db2777;
      --orange-bg:#fff7ed;--orange:#ea580c;--blue-bg:#eff6ff;--blue:#2563eb;
      --radius:8px;--radius-lg:12px;--radius-xl:16px;
      --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 2px 8px rgba(0,0,0,.06);
      --font:-apple-system,BlinkMacSystemFont,"Noto Sans SC","Segoe UI",Roboto,sans-serif;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}

    /* ===== Top Nav ===== */
    .topnav{
      height:56px;background:var(--white);border-bottom:1px solid var(--border);
      padding:0 28px;display:flex;align-items:center;gap:20px;
      position:sticky;top:0;z-index:100;flex-wrap:nowrap;
    }
    .tn-logo{
      font-size:18px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;
      letter-spacing:-.3px;flex-shrink:0;text-decoration:none;
    }
    .tn-logo-mark{
      width:30px;height:30px;border-radius:8px;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;
      display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border-radius:7px;
    }
    .tn-divider{width:1px;height:24px;background:var(--border);flex-shrink:0}
    .tn-team{
      display:flex;align-items:center;gap:6px;padding:5px 12px;
      border-radius:100px;border:1px solid var(--border);
      background:var(--white);cursor:pointer;font-size:13px;font-weight:600;
      color:var(--text);transition:border-color .15s;flex-shrink:0;white-space:nowrap;
    }
    .tn-team:hover{border-color:var(--primary)}
    .tn-team-dot{width:10px;height:10px;border-radius:50%;background:var(--pink)}
    .tn-scope{
      display:flex;align-items:center;gap:6px;padding:5px 12px;
      border-radius:100px;border:1px solid var(--border);
      background:var(--white);cursor:pointer;font-size:13px;
      color:var(--text);transition:border-color .15s;flex-shrink:0;white-space:nowrap;
    }
    .tn-scope:hover{border-color:var(--primary)}
    .tn-spacer{flex:1;min-width:20px}
    .tn-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
    .tn-link{font-size:13px;color:var(--text-sec);text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .tn-link:hover{color:var(--primary)}
    .tn-avatar{
      width:32px;height:32px;border-radius:50%;background:var(--primary-soft);
      color:var(--primary);display:flex;align-items:center;justify-content:center;
      font-size:13px;font-weight:700;cursor:pointer;
    }

    /* ===== Hero ===== */
    .hero{padding:36px 28px 0;max-width:1200px;margin:0 auto}
    @media(max-width:720px){.hero{padding:24px 16px 0}}
    .hero-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
    .hero-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .hero-title{font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
    .badge-free{
      font-size:11px;font-weight:700;padding:2px 9px;
      border-radius:100px;background:var(--green-bg);color:var(--green);
      letter-spacing:.3px;text-transform:uppercase;
    }

    .hero-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .hero-search{
      width:260px;height:38px;border-radius:var(--radius-lg);
      border:1px solid var(--border);padding:0 14px 0 38px;
      font-size:13.5px;outline:none;transition:all .18s;font-family:inherit;
      color:var(--text);background:var(--white);
    }
    .hero-search::placeholder{color:var(--text-light)}
    .hero-search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.08)}
    .search-icon-abs{
      position:absolute;left:12px;top:50%;transform:translateY(-50%);
      width:16px;height:16px;fill:var(--text-light);pointer-events:none;
    }
    .btn-outline{
      height:38px;padding:0 16px;border-radius:var(--radius-lg);
      border:1px solid var(--border);background:var(--white);
      color:var(--text);font-size:13px;font-weight:500;
      cursor:pointer;display:flex;align-items:center;gap:6px;
      transition:all .18s;font-family:inherit;white-space:nowrap;
    }
    .btn-outline:hover{border-color:var(--primary);color:var(--primary)}

    /* ===== Tags Row ===== */
    .tags-row{padding:20px 28px 0;max-width:1200px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap}
    @media(max-width:720px){.tags-row{padding:16px 16px 0}}

    .chip{
      height:34px;padding:0 16px;border-radius:100px;
      border:1px solid var(--border);background:var(--white);
      color:var(--text-sec);font-size:13px;font-weight:500;
      cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;
      gap:6px;font-family:inherit;white-space:nowrap;
    }
    .chip:hover{border-color:var(--text-light);color:var(--text)}
    .chip.active{
      background:var(--text);color:var(--white);border-color:var(--text);
    }

    /* ===== Stats ===== */
    .stats-line{font-size:12px;color:var(--text-light);letter-spacing:.3px;padding:16px 28px 0;max-width:1200px;margin:0 auto;font-weight:500}
    @media(max-width:720px){.stats-line{padding:12px 16px 0}}

    /* ===== Grid ===== */
    .grid{padding:20px 28px 80px;max-width:1200px;margin:0 auto;
      display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
    @media(max-width:720px){.grid{padding:16px 16px 60px;grid-template-columns:1fr}}

    /* ===== Card (Netlify Style) ===== */
    .card{
      background:var(--white);border:1px solid var(--border-light);
      border-radius:var(--radius-xl);overflow:hidden;
      text-decoration:none;color:var(--text);display:flex;flex-direction:column;
      transition:all .2s ease;
    }
    .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border)}

    .card-inner{padding:24px;display:flex;flex-direction:column;gap:12px;flex:1}
    .card-head{display:flex;align-items:center;justify-content:space-between}
    .card-icon{
      width:44px;height:44px;border-radius:var(--radius-lg);
      display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;
    }
    .card-status{
      font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;
      letter-spacing:.3px;text-transform:uppercase;
    }
    .status-live{background:var(--green-bg);color:var(--green)}
    .status-new{background:var(--pink-bg);color:var(--pink)}
    .status-draft{background:#f3f4f6;color:var(--text-sec)}

    .card-name{font-size:17px;font-weight:700;letter-spacing:-.2px}
    .card-desc{font-size:13.5px;color:var(--text-sec);line-height:1.58}
    .card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
    .meta-tag{
      font-size:11.5px;font-weight:600;padding:3px 10px;
      border-radius:6px;
    }
    .mt-green{background:var(--green-bg);color:var(--green)}
    .mt-blue{background:var(--blue-bg);color:var(--blue)}
    .mt-orange{background:var(--orange-bg);color:var(--orange)}

    .card-foot{
      margin-top:auto;padding:14px 24px;border-top:1px solid var(--border-light);
      display:flex;align-items:center;justify-content:space-between;
    }
    .card-url{
      font-size:11.5px;color:var(--text-light);
      font-family:"SF Mono",Consolas,monospace;
      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%;
    }
    .card-go{
      font-size:13px;font-weight:600;color:var(--primary);
      display:flex;align-items:center;gap:3px;transition:gap .2s;
    }
    .card:hover .card-go{gap:7px}

    /* Empty */
    .empty{grid-column:1/-1;text-align:center;padding:72px 20px}
    .empty-icon{font-size:52px;margin-bottom:14px;display:block}
    .empty-t{font-size:17px;font-weight:600;margin-bottom:6px}
    .empty-d{font-size:14px;color:var(--text-sec)}

    /* Mobile nav collapse */
    @media(max-width:640px){
      .topnav{padding:0 14px;gap:10px}
      .tn-team,.tn-scope,.tn-link span{display:none}
      .hero-search{width:180px}
      .btn-outline{height:34px;padding:0 12px;font-size:12px}
    }
  </style>
</head>
<body>

<!-- Top Nav -->
<nav class="topnav">
  <a class="tn-logo"><span class="tn-logo-mark">A</span> 应用控制台</a>
  <div class="tn-divider"></div>
  <button class="tn-team"><span class="tn-team-dot"></span> kongq</button>
  <button class="tn-scope">📱 所有应用</button>
  <div class="tn-spacer"></div>
  <div class="tn-right">
    <a class="tn-link" href="#">❓ 支持</a>
    <div class="tn-avatar">K</div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-row">
    <div class="hero-left">
      <h1 class="hero-title">我的应用</h1>
      <span class="badge-free">Free</span>
    </div>
    <div class="hero-actions">
      <div style="position:relative">
        <svg class="search-icon-abs" viewBox="0 0 24 24"><path d="M21 21l-5.2-5.2C16.2 14.4 14.8 15 13.2 15 9.8 15 7 12.2 7 8.8S9.8 2.6 13.2 2.6s6.2 2.8 6.2 6.2c0 1.6-.6 3-1.8 4l5.2 5.2zM13.2 13.6c2.4 0 4.4-2 4.4-4.4s-2-4.4-4.4-4.4-4.4 2-4.4 4.4 2 4.4 4.4 4.4z"/></svg>
        <input class="hero-search" id="searchInput" placeholder="Search apps…" />
      </div>
      <button class="btn-outline" id="themeBtn">🌙</button>
      <button class="btn-outline">＋ 添加应用</button>
    </div>
  </div>
</section>

<!-- Tags -->
<div class="tags-row" id="tagsRow"></div>

<!-- Stats -->
<div class="stats-line" id="statsLine"></div>

<!-- Grid -->
<div class="grid" id="grid"></div>

<script>
// ============================================================
// ⚙️  配置区 — 在这里添加你的应用
//
//  path   : 相对路径 或 完整 URL（如 https://xxx.netlify.app）
//  status : 'live' | 'new' | 'draft'
// ============================================================
const APPS = [
  {
    name: "青海甘肃旅行攻略",
    desc: "大西北环线旅行攻略，涵盖行程规划、景点推荐、美食住宿等实用信息。",
    icon: "🏔️",
    path: "https://thunderous-dodol-05fb2f.netlify.app/",
    category: "旅行",
    tags: ["青海", "甘肃", "攻略"],
    status: "live"
  },
  {
    name: "Markdown 排版编辑器",
    desc: "支持实时预览的 Markdown 编辑器，适合撰写文档和排版内容。",
    icon: "📝",
    path: "https://imaginative-tartufo-d12aa2.netlify.app/",
    category: "工具",
    tags: ["Markdown", "编辑器"],
    status: "live"
  },
  {
    name: "One Step 待办任务管理",
    desc: "简洁高效的任务管理工具，帮你一步一步完成每天的目标。",
    icon: "📋",
    path: "https://profound-figolla-a17913.netlify.app/",
    category: "效率工具",
    tags: ["任务", "待办"],
    status: "live"
  },
  // ─── 在这里继续添加更多应用 ───
  // { name:"应用名", desc:"描述", icon:"🚀", path:"URL", category:"分类", tags:["标签"], status:"live" },
];

// ============================================================
//  Logic
// ============================================================
const $ = s => document.getElementById(s);
const grid = $("grid"), searchInput = $("searchInput"),
      tagsRow = $("tagsRow"), statsLine = $("statsLine"),
      themeBtn = $("themeBtn");

let activeCat = "全部";

/* Theme */
function initTheme(){
  const s=localStorage.getItem("dash-theme"); if(s==="dark") applyDark();
}
function applyDark(){
  document.body.classList.toggle("dark");
  const d=document.body.classList.contains("dark");
  document.documentElement.style.setProperty("--bg","#111827");
  document.documentElement.style.setProperty("--white","#1f2937");
  document.documentElement.style.setProperty("--surface","#1f2937");
  document.documentElement.style.setProperty("--border","#374151");
  document.documentElement.style.setProperty("--border-light","#292524");
  document.documentElement.style.setProperty("--text","#f9fafb");
  document.documentElement.style.setProperty("--text-sec","#9ca3af");
  document.documentElement.style.setProperty("--text-light","#6b7280");
  document.documentElement.style.setProperty("--primary-soft","rgba(99,102,241,.12)");
  document.documentElement.style.setProperty("--green-bg","rgba(16,185,129,.12)");
  document.documentElement.style.setProperty("--pink-bg","rgba(219,39,119,.12)");
  document.documentElement.style.setProperty("--blue-bg","rgba(37,99,235,.12)");
  document.documentElement.style.setProperty("--orange-bg","rgba(234,88,12,.12)");
  document.documentElement.style.setProperty("--shadow-md","0 2px 8px rgba(0,0,0,.25)");
  themeBtn.textContent=d?"☀️":"🌙";
  localStorage.setItem("dash-theme",d?"dark":"light");
}
if(!document.body.classList.contains("dark")){
  // reset CSS vars for light mode defaults are in :root already
}
function toggleTheme(){
  if(document.body.classList.contains("dark")){
    location.reload(); // simplest full reset for now
    localStorage.setItem("dash-theme","light");
  } else { applyDark(); }
}
themeBtn.addEventListener("click",toggleTheme);
initTheme();

/* Categories */
const tagStyles = ["","mt-green","mt-blue","mt-orange"];
function getCats(){ const s=new Set(); APPS.forEach(a=>s.add(a.category)); return ["全部",...Array.from(s).sort()]; }

function renderTags(){
  tagsRow.innerHTML=getCats().map(c =>
    `<button class="chip${c===activeCat?" active":""}" data-cat="${c}">${c}</button>`
  ).join("");
  tagsRow.querySelectorAll(".chip").forEach(b=>{
    b.addEventListener("click",()=>{activeCat=b.dataset.cat;render()});
  });
}

function render(){
  const kw=searchInput.value.trim().toLowerCase();
  const filtered=APPS.filter(a=>{
    if(activeCat!=="全部"&&a.category!==activeCat)return false;
    if(!kw)return true;
    return [a.name,a.desc,a.tags.join(" "),a.category].join(" ").toLowerCase().includes(kw);
  });

  const total=APPS.length,shown=filtered.length;
  statsLine.textContent=(kw||activeCat!=="全部")
    ? `Showing ${shown} of ${total} app${total!==1?"s":""}`
    : `${total} app${total!==1?"s":""}`;

  if(!filtered.length){
    grid.innerHTML=`<div class="empty">
      <span class="empty-icon">📭</span><div class="empty-t">未找到匹配的应用</div>
      <div class="empty-d">试试修改搜索关键词或切换分类</div></div>`;
    return;
  }

  grid.innerHTML=filtered.map((app,i)=>{
    let url=app.path;
    try{ url=new URL(app.path).hostname; }catch(e){}
    return `<a class="card" href="${app.path}" target="_blank" rel="noopener">
      <div class="card-inner">
        <div class="card-head">
          <div class="card-icon">${app.icon}</div>
          <span class="card-status status-${app.status||'draft'}">${app.status==='live'?'LIVE':app.status==='new'?'NEW':'DRAFT'}</span>
        </div>
        <div class="card-name">${app.name}</div>
        <div class="card-desc">${app.desc}</div>
        <div class="card-meta">
          ${app.tags.map(t=>`<span class="meta-tag ${tagStyles[(i+1)%tagStyles.length]}">${t}</span>`).join("")}
        </div>
      </div>
      <div class="card-foot">
        <span class="card-url">${url}</span>
        <span class="card-go">Open ↗</span>
      </div>
    </a>`}).join("");
}

let timer;
searchInput.addEventListener("input",()=>{clearTimeout(timer);timer=setTimeout(render,120)});
renderTags();render();
</script>
</body>
</html>
